<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login | Self-Care Excellence Awards 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,300;1,6..12,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css" />
<style>
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .auth-section { flex: 1; display: flex; align-items: center; margin-top: 62px; }
  .auth-section .container { width: 100%; }
  .auth-banner .icon-circle {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
    margin: 0 auto 0.75rem;
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="top">
  <a href="index.html" class="nav-logo">Self-Care Excellence Awards 2026</a>
  <button class="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    <li><a href="index.html">&larr; Back to Home</a></li>
  </ul>
</nav>

<main class="auth-section">
  <div class="container">
    <div class="auth-wrap">
      <div class="auth-banner">
        <div class="icon-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f7efe6" stroke-width="1.8">
            <path d="M12 11c1.657 0 3-1.79 3-4s-1.343-4-3-4-3 1.79-3 4 1.343 4 3 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
        <h1>SwipeRx Admin Login</h1>
        <p>Self-Care Excellence Awards 2026</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="swiperx.admin@swiperx.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-primary btn-block">Sign In</button>

        <p class="auth-note">Access restricted to SwipeRx staff managing the judging programme.</p>
      </form>
    </div>
  </div>
</main>

<footer>
  <div class="footer-logo">Self-Care Excellence Awards 2026</div>
  <div class="footer-note">Confidential — for authorised judges only · SwipeRx 2026</div>
</footer>

<script src="assets/js/nav.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    window.location.href = 'admin-dashboard.html';
  });
</script>
</body>
</html>
